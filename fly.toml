# fly.toml app configuration file generated for integrity-little-sunset-7758 on 2026-03-31T23:49:30+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'integrity-little-sunset-7758'
primary_region = 'ams'

[build]

[env]
  SERVER_PORT = "5000"
  SERVER_DEBUG = "false"
  LOG_DIR = "/data/logs"
  SERVER_FILES_FOLDER = "/data/files"
  RASBHARI_POSTGRES_PORT = "5432"
  EVENTS_POSTGRES_PORT = "5432"
  QUEUE_POSTGRES_PORT = "5432"
  NOTIFICATIONS_POSTGRES_PORT = "5432"
  THOUGHTS_POSTGRES_PORT = "5432"

[[mounts]]
  source = "rasbhari_data"
  destination = "/data"

[http_service]
  internal_port = 5000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
