{% extends "index.html" %}

{% block title %}{{ post.title }} - Blog{% endblock %}

{% block content %}
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

<article class="blog-reader mx-auto w-full max-w-[1360px] px-3 py-4 md:px-8 md:py-8">
    <header class="blog-reader-header">
        <a href="/blogs/home" class="blog-back-link">
            <span aria-hidden="true">←</span>
            <span>Back to Feed</span>
        </a>

        <div class="blog-title-block">
            <div class="blog-kicker">Rasbhari Blog</div>
            <h1>{{ post.title }}</h1>
            <div class="blog-meta-row">
                <span>{{ post.created_at|datetimeformat }}</span>
                {% if post.tags %}
                <span class="blog-meta-divider" aria-hidden="true"></span>
                <div class="blog-tags">
                    {% for tag in post.tags %}
                    <span>#{{ tag }}</span>
                    {% endfor %}
                </div>
                {% endif %}
            </div>
        </div>
    </header>

    <div class="blog-reading-shell">
        <div id="blog-content" class="markdown-body">
            <!-- Markdown rendered here -->
        </div>
    </div>
</article>

<style>
    .blog-reader {
        color: var(--text);
    }

    .blog-reader-header {
        margin: 0 auto 2rem;
        max-width: 104ch;
    }

    .blog-back-link {
        display: inline-flex;
        align-items: center;
        gap: 0.45rem;
        color: var(--text-soft);
        font-size: 0.82rem;
        font-weight: 800;
        letter-spacing: 0.02em;
        margin-bottom: 1.35rem;
        transition: color var(--transition-speed), transform var(--transition-speed);
    }

    .blog-back-link:hover {
        color: var(--accent);
        transform: translateX(-2px);
    }

    .blog-title-block {
        border-bottom: 1px solid var(--border);
        padding-bottom: 1.75rem;
    }

    .blog-kicker {
        color: var(--accent);
        font-size: 0.72rem;
        font-weight: 900;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        margin-bottom: 0.85rem;
    }

    .blog-title-block h1 {
        color: var(--text);
        font-size: clamp(2.5rem, 5vw, 5.25rem);
        font-weight: 900;
        letter-spacing: -0.075em;
        line-height: 0.92;
        max-width: 14em;
    }

    .blog-meta-row {
        align-items: center;
        color: var(--text-soft);
        display: flex;
        flex-wrap: wrap;
        font-size: 0.82rem;
        font-weight: 700;
        gap: 0.75rem;
        margin-top: 1.15rem;
    }

    .blog-meta-divider {
        background: var(--border);
        border-radius: 999px;
        display: inline-block;
        height: 1rem;
        width: 1px;
    }

    .blog-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 0.45rem;
    }

    .blog-tags span {
        background: var(--accent-soft);
        border: 1px solid color-mix(in srgb, var(--accent) 18%, transparent);
        border-radius: 999px;
        color: var(--accent-strong);
        font-size: 0.68rem;
        font-weight: 900;
        letter-spacing: 0.08em;
        padding: 0.25rem 0.55rem;
        text-transform: uppercase;
    }

    .blog-reading-shell {
        background:
            linear-gradient(180deg, var(--surface-strong), var(--surface)),
            var(--surface);
        border: 1px solid var(--border);
        border-radius: 2rem;
        box-shadow: var(--shadow-card);
        margin: 0 auto;
        max-width: 104ch;
        padding: clamp(1.75rem, 4vw, 4.5rem);
    }

    .markdown-body {
        color: var(--text);
        font-size: clamp(1.02rem, 1vw, 1.14rem);
        line-height: 1.82;
        overflow-wrap: break-word;
    }

    .markdown-body > :first-child {
        margin-top: 0;
    }

    .markdown-body > :last-child {
        margin-bottom: 0;
    }

    .markdown-body h1,
    .markdown-body h2,
    .markdown-body h3,
    .markdown-body h4 {
        color: var(--text);
        font-weight: 900;
        letter-spacing: -0.035em;
        line-height: 1.12;
    }

    .markdown-body h1 {
        border-bottom: 1px solid var(--border);
        font-size: clamp(2rem, 3vw, 3rem);
        margin: 0 0 1.25rem;
        padding-bottom: 1rem;
    }

    .markdown-body h2 {
        border-top: 1px solid var(--border);
        font-size: clamp(1.55rem, 2.2vw, 2.25rem);
        margin: 2.75rem 0 1rem;
        padding-top: 1.8rem;
    }

    .markdown-body h3 {
        font-size: clamp(1.24rem, 1.6vw, 1.55rem);
        margin: 2rem 0 0.75rem;
    }

    .markdown-body h4 {
        font-size: 1rem;
        letter-spacing: 0;
        margin: 1.5rem 0 0.5rem;
    }

    .markdown-body p {
        margin: 0 0 1.25rem;
    }

    .markdown-body strong {
        color: var(--text);
        font-weight: 900;
    }

    .markdown-body ul,
    .markdown-body ol {
        margin: 0 0 1.35rem;
        padding-left: 1.35rem;
    }

    .markdown-body ul {
        list-style-type: disc;
    }

    .markdown-body ol {
        list-style-type: decimal;
    }

    .markdown-body li {
        margin-bottom: 0.55rem;
        padding-left: 0.2rem;
    }

    .markdown-body li::marker {
        color: var(--accent);
        font-weight: 900;
    }

    .markdown-body blockquote {
        background: var(--accent-soft);
        border-left: 5px solid var(--accent);
        border-radius: 1.1rem;
        color: var(--text);
        margin: 1.8rem 0;
        padding: 1.1rem 1.35rem;
    }

    .markdown-body blockquote p:last-child {
        margin-bottom: 0;
    }

    .markdown-body code {
        background: var(--surface-muted);
        border: 1px solid var(--border);
        border-radius: 0.45rem;
        color: var(--accent-strong);
        font-family: var(--font-mono);
        font-size: 0.86em;
        padding: 0.12rem 0.38rem;
    }

    .markdown-body pre {
        background: #101827;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 1.25rem;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
        margin: 1.75rem 0;
        overflow-x: auto;
        padding: 1.2rem;
    }

    .markdown-body pre code {
        background: transparent;
        border: 0;
        color: #e5edf8;
        padding: 0;
    }

    .markdown-body img {
        max-width: 100%;
        border-radius: 1.4rem;
        box-shadow: var(--shadow-soft);
        margin: 2rem 0;
    }

    .markdown-body a {
        color: var(--accent);
        font-weight: 800;
        text-decoration: underline;
        text-decoration-thickness: 0.08em;
        text-underline-offset: 0.18em;
    }

    .markdown-body hr {
        border: 0;
        border-top: 1px solid var(--border);
        margin: 2.5rem 0;
    }

    @media (max-width: 720px) {
        .blog-reader {
            padding-left: 0.25rem;
            padding-right: 0.25rem;
        }

        .blog-reading-shell {
            border-radius: 1.35rem;
            padding: 1.35rem;
        }

        .blog-title-block h1 {
            letter-spacing: -0.055em;
        }
    }
</style>

<script>
    document.addEventListener('DOMContentLoaded', (event) => {
        // Use |safe to avoid double escaping if needed, but tojson is safer for JS
        const rawContent = {{ post.content|tojson }};
        
        // Configure marked for the latest version API
        marked.setOptions({
            breaks: true,
            gfm: true,
            headerIds: true,
            mangle: false
        });

        // Parse markdown and set HTML
        const htmlContent = marked.parse(rawContent);
        const contentArea = document.getElementById('blog-content');
        contentArea.innerHTML = htmlContent;
        
        // Trigger highlight.js
        contentArea.querySelectorAll('pre code').forEach((block) => {
            hljs.highlightElement(block);
        });
    });
</script>
{% endblock %}
