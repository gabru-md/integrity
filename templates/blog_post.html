{% extends "index.html" %}

{% block title %}{{ post.title }} - Blog{% endblock %}

{% block content %}
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

<div class="p-6 max-w-4xl mx-auto">
    <div class="mb-8">
        <a href="/blogs/home" class="text-[var(--accent-color)] hover:text-[var(--accent-color)]/80 dark:text-[var(--accent-color)]/60 font-bold flex items-center mb-6">
            <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            Back to Feed
        </a>
        <h1 class="text-4xl md:text-5xl font-extrabold text-slate-800 dark:text-gray-100 mb-4">{{ post.title }}</h1>
        <div class="flex items-center text-sm text-slate-500 dark:text-gray-400 space-x-4">
            <span>{{ post.created_at|datetimeformat }}</span>
            <div class="flex gap-2">
                {% for tag in post.tags %}
                <span class="px-2 py-0.5 bg-slate-100 dark:bg-gray-800 rounded text-[10px] font-bold uppercase tracking-wider">#{{ tag }}</span>
                {% endfor %}
            </div>
        </div>
    </div>

    <div id="blog-content" class="prose prose-slate dark:prose-invert max-w-none 
                                prose-headings:font-extrabold prose-a:text-emerald-600 
                                prose-pre:bg-gray-900 prose-pre:border prose-pre:border-gray-800
                                bg-white dark:bg-gray-900 p-8 md:p-12 rounded-3xl shadow-sm border border-slate-100 dark:border-gray-800">
        <!-- Markdown rendered here -->
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', (event) => {
        const content = {{ post.content|tojson }};
        
        marked.setOptions({
            highlight: function(code, lang) {
                const language = hljs.getLanguage(lang) ? lang : 'plaintext';
                return hljs.highlight(code, { language }).value;
            },
            langPrefix: 'hljs language-',
            breaks: true,
            gfm: true
        });

        document.getElementById('blog-content').innerHTML = marked.parse(content);
        hljs.highlightAll();
    });
</script>

<style>
    #blog-content h1, #blog-content h2, #blog-content h3 { border-bottom: 1px solid rgba(0,0,0,0.05); padding-bottom: 0.5rem; margin-top: 2.5rem; }
    .dark #blog-content h1, .dark #blog-content h2, .dark #blog-content h3 { border-bottom: 1px solid rgba(255,255,255,0.05); }
    #blog-content blockquote { border-left-color: #10b981; background: rgba(16, 185, 129, 0.05); padding: 1rem 2rem; border-radius: 0 1rem 1rem 0; }
</style>
{% endblock %}
