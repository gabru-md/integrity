{% extends "index.html" %}

{% block title %}{{ post.title }} - Blog{% endblock %}

{% block content %}
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

<div class="p-6 max-w-4xl mx-auto">
    <div class="mb-8">
        <a href="/blogs/home" class="text-[var(--accent-color)] hover:text-[var(--accent-color)]/80 dark:text-[var(--accent-color)]/60 font-bold flex items-center mb-6">
            <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            Back to Feed
        </a>
        <h1 class="text-4xl md:text-5xl font-extrabold text-slate-800 dark:text-gray-100 mb-4">{{ post.title }}</h1>
        <div class="flex items-center text-sm text-slate-500 dark:text-gray-400 space-x-4">
            <span>{{ post.created_at|datetimeformat }}</span>
            <div class="flex gap-2">
                {% for tag in post.tags %}
                <span class="px-2 py-0.5 bg-slate-100 dark:bg-gray-800 rounded text-[10px] font-bold uppercase tracking-wider">#{{ tag }}</span>
                {% endfor %}
            </div>
        </div>
    </div>

    <div id="blog-content" class="markdown-body bg-white dark:bg-gray-900 p-8 md:p-12 rounded-3xl shadow-sm border border-slate-100 dark:border-gray-800 text-slate-800 dark:text-gray-200">
        <!-- Markdown rendered here -->
    </div>
</div>

<style>
    /* Basic Markdown Styling to ensure headings work even without tailwind-typography */
    .markdown-body {
        line-height: 1.6;
        font-size: 1.125rem;
    }
    .markdown-body h1 { font-size: 2.25rem; font-weight: 800; margin-top: 2rem; margin-bottom: 1rem; border-bottom: 1px solid #eee; padding-bottom: 0.5rem; }
    .markdown-body h2 { font-size: 1.875rem; font-weight: 700; margin-top: 2rem; margin-bottom: 1rem; border-bottom: 1px solid #eee; padding-bottom: 0.5rem; }
    .markdown-body h3 { font-size: 1.5rem; font-weight: 700; margin-top: 1.5rem; margin-bottom: 0.75rem; }
    .markdown-body p { margin-bottom: 1.25rem; }
    .markdown-body ul, .markdown-body ol { margin-bottom: 1.25rem; padding-left: 1.5rem; }
    .markdown-body ul { list-style-type: disc; }
    .markdown-body ol { list-style-type: decimal; }
    .markdown-body li { margin-bottom: 0.5rem; }
    .markdown-body blockquote { 
        border-left: 4px solid #10b981; 
        background: rgba(16, 185, 129, 0.05); 
        padding: 1rem 1.5rem; 
        margin: 1.5rem 0;
        font-style: italic;
        border-radius: 0 0.5rem 0.5rem 0;
    }
    .markdown-body code {
        background-color: rgba(0,0,0,0.05);
        padding: 0.2rem 0.4rem;
        border-radius: 0.25rem;
        font-family: monospace;
        font-size: 0.9em;
    }
    .markdown-body pre {
        background-color: #1a1a1a;
        padding: 1.5rem;
        border-radius: 1rem;
        overflow-x: auto;
        margin: 1.5rem 0;
    }
    .markdown-body pre code {
        background-color: transparent;
        padding: 0;
        color: #e5e7eb;
    }
    .markdown-body img {
        max-width: 100%;
        border-radius: 1rem;
        margin: 2rem 0;
    }
    .markdown-body a {
        color: #10b981;
        text-decoration: underline;
    }

    /* Dark mode overrides */
    .dark .markdown-body h1, .dark .markdown-body h2 { border-color: rgba(255,255,255,0.1); }
    .dark .markdown-body code { background-color: rgba(255,255,255,0.1); }
</style>

<script>
    document.addEventListener('DOMContentLoaded', (event) => {
        // Use |safe to avoid double escaping if needed, but tojson is safer for JS
        const rawContent = {{ post.content|tojson }};
        
        // Configure marked for the latest version API
        marked.setOptions({
            breaks: true,
            gfm: true,
            headerIds: true,
            mangle: false
        });

        // Parse markdown and set HTML
        const htmlContent = marked.parse(rawContent);
        const contentArea = document.getElementById('blog-content');
        contentArea.innerHTML = htmlContent;
        
        // Trigger highlight.js
        contentArea.querySelectorAll('pre code').forEach((block) => {
            hljs.highlightElement(block);
        });
    });
</script>
{% endblock %}
